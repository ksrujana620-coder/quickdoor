<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick door - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script>
    // Immediate redirect if not logged in
    if (!localStorage.getItem('user')) {
      window.location.href = 'login.html';
    }
  </script>
  <header>
    <div class="container">
      <h1 style="display: flex; align-items: center; gap: 10px;">
        <img src="images/qvs.jpeg" alt="Quick door Logo" class="logo">
        <a href="home.html" style="color:var(--primary-color); text-decoration:none;">Quick door</a>
      </h1>
      <nav>
        <ul>
          <li><a href="home.html" class="active">Home</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="login.html" id="navLoginLink">Login</a></li>
          <li><a href="signup.html" id="navSignupLink">Signup</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search: Grocery, Sweets, Snacks, Tiffin, Drinks..."
        oninput="searchProducts()">
      <button class="btn" onclick="searchProducts()"><i class="fas fa-search"></i> Search</button>
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs">
      <div class="category-tab active" data-category="all" onclick="filterCategory('all', this)">
        <i class="fas fa-th-large"></i>
        <span>All</span>
      </div>
      <div class="category-tab" data-category="grocery" onclick="filterCategory('grocery', this)">
        <i class="fas fa-shopping-basket"></i>
        <span>Grocery</span>
      </div>
      <div class="category-tab" data-category="sweets" onclick="filterCategory('sweets', this)">
        <i class="fas fa-cookie"></i>
        <span>Sweets</span>
      </div>
      <div class="category-tab" data-category="snacks" onclick="filterCategory('snacks', this)">
        <i class="fas fa-apple-whole"></i>
        <span>Snacks</span>
      </div>
      <div class="category-tab" data-category="tiffin" onclick="filterCategory('tiffin', this)">
        <i class="fas fa-utensils"></i>
        <span>Tiffin</span>
      </div>
      <div class="category-tab" data-category="drinks" onclick="filterCategory('drinks', this)">
        <i class="fas fa-wine-glass-alt"></i>
        <span>Drinks</span>
      </div>
    </div>

    <h2>Products</h2>
    <div class="product-grid" id="productGrid">
      <p style="text-align:center; padding: 40px; color: #7f8c8d;">Loading products...</p>
    </div>
  </div>

  <!-- Customer Support Floating Button -->
  <a href="https://wa.me/919553925018" target="_blank" class="support-btn" title="Contact Support">
    <i class="fab fa-whatsapp"></i>
    <span>Support</span>
  </a>

  <style>
    .support-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: #25d366;
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      font-weight: 700;
      z-index: 1000;
      transition: transform 0.3s ease, background-color 0.3s ease;
    }
    .support-btn:hover {
      transform: scale(1.05);
      background-color: #128c7e;
      color: white;
    }
    .support-btn i {
      font-size: 24px;
    }
    @media (max-width: 600px) {
      .support-btn span {
        display: none;
      }
      .support-btn {
        padding: 15px;
        bottom: 20px;
        right: 20px;
      }
    }
  </style>

  <script src="js/app.js"></script>
  <script>
    // Update nav based on login state
    document.addEventListener('DOMContentLoaded', () => {
      const user = localStorage.getItem('user');
      const loginLink = document.getElementById('navLoginLink');
      const signupLink = document.getElementById('navSignupLink');
      if (user && loginLink && signupLink) {
        loginLink.textContent = 'Logout';
        loginLink.href = '#';
        loginLink.onclick = function () {
          localStorage.removeItem('user');
          window.location.reload();
        };
        signupLink.style.display = 'none';
      }
    });
  </script>
</body>
</html>
